<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Windows Logs | Cyber Monitor</title>
<style>:root{color-scheme:dark;--bg:#090b10;--panel:#111620;--border:#263244;--text:#e6edf7;--muted:#8b9bb2;--cyan:#32d5ff;--red:#ff5c7a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Consolas,"Courier New",monospace}.shell{width:min(1180px,calc(100% - 32px));margin:auto;padding:28px 0}header{display:flex;justify-content:space-between;align-items:center;gap:16px;border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:22px}h1{margin:0}nav,.tabs{display:flex;gap:10px;flex-wrap:wrap}nav a,button{border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;text-decoration:none;background:#121a27;font:inherit;cursor:pointer}nav a.active,.tab.active{border-color:var(--cyan);color:var(--cyan);background:#102134}.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center}.muted{color:var(--muted);font-size:.84rem}.tabs{margin:18px 0 14px}.tab .count{color:var(--muted);margin-left:5px}.logs{display:grid;gap:10px}.log{background:#0d1118;border:1px solid var(--border);border-left:3px solid var(--cyan);padding:14px;border-radius:6px}.log.error,.log.critical{border-left-color:var(--red)}.meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;font-size:.8rem;color:var(--muted)}.message{white-space:pre-wrap;overflow-wrap:anywhere}.empty{padding:25px;color:var(--muted);text-align:center}@media(max-width:700px){header,.head{align-items:flex-start;flex-direction:column}}</style></head>
<body><main class="shell"><header><div><h1>Windows Event Logs</h1><div class="muted">Application, Security, Setup, System, and Forwarded Events</div></div><nav aria-label="Primary navigation"><a href="/">This Device</a><a href="/network">Network Devices</a><a class="active" href="/logs">Windows Logs</a><a href="/security">Security View</a></nav></header><section class="panel"><div class="head"><div><strong id="host">Loading host...</strong><div class="muted" id="status">Reading Windows Event Logs...</div></div><button onclick="loadLogs()">Refresh</button></div><div class="tabs" id="tabs" role="tablist"></div><div class="logs" id="events"></div></section></main>
<script>
let channels=[],activeChannel='Application';const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function normalizeChannels(logs){const expected=['Application','Security','Setup','System','ForwardedEvents'],rows=Array.isArray(logs)?logs:[];return expected.map(name=>{const row=rows.find(item=>item&&item.name===name)||{};return{name,events:Array.isArray(row.events)?row.events:[],error:row.error||null}})}
function formatTime(value){const match=String(value??'').match(/^\/Date\((\d+)\)\/$/);return match?new Date(Number(match[1])).toLocaleString():String(value??'Unknown')}
function render(){document.getElementById('tabs').innerHTML=channels.map(channel=>`<button class="tab ${channel.name===activeChannel?'active':''}" onclick="selectChannel('${esc(channel.name)}')">${esc(channel.name==='ForwardedEvents'?'Forwarded Events':channel.name)} <span class="count">${channel.events.length}</span></button>`).join('');const channel=channels.find(item=>item.name===activeChannel);if(!channel){document.getElementById('events').innerHTML='<div class="empty">No Windows log channels were returned.</div>';return}if(channel.error){document.getElementById('events').innerHTML=`<div class="empty">${esc(channel.error)}</div>`;return}document.getElementById('events').innerHTML=channel.events.length?channel.events.map(event=>`<article class="log ${esc(String(event.level).toLowerCase())}"><div class="meta"><span>${esc(formatTime(event.timestamp))}</span><span>${esc(event.level)}</span><span>Event ${esc(event.event_id)}</span><span>${esc(event.source)}</span></div><div class="message">${esc(event.message)}</div></article>`).join(''):'<div class="empty">This Windows log contains no recent events.</div>'}
function selectChannel(name){activeChannel=name;render()}
async function loadLogs(){const status=document.getElementById('status');status.textContent='Reading entries from all five Windows Event Logs...';try{const response=await fetch('/api/system/logs?limit=1000'),data=await response.json();if(!response.ok)throw new Error(data.error||`Request failed (${response.status})`);document.getElementById('host').textContent=data.hostname||'This device';channels=normalizeChannels(data.logs);const total=channels.reduce((sum,channel)=>sum+channel.events.length,0);status.textContent=`Loaded ${total} event(s) from ${channels.length} Windows log channels.`;render()}catch(error){channels=normalizeChannels([]);render();status.textContent=`Could not load Windows logs: ${error.message}`}}
loadLogs();
</script></body></html>
